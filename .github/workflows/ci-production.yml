name: CD - Production Deployment

on:
  pull_request_review:
    types: [submitted]
    branches: [master]

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    if: |
      github.event.review.state == 'approved' &&
      github.event.pull_request.state == 'open'
    environment: production

    steps:
      - name: Get PR information
        id: pr-info
        run: |
          echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "head-ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          echo "head-sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.head-sha }}

      - name: Deploy to production with Dokku
        uses: dokku/github-action@master
        with:
          branch: ${{ steps.pr-info.outputs.head-ref }}
          git_remote_url: ssh://dokku@${{ vars.DOKKU_PRODUCTION_HOST }}:22/boardgamejourney
          ssh_private_key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Set up SSH for production configuration
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DOKKU_SSH_PRIVATE_KEY }}

      - name: Configure production environment
        run: |
          ssh-keyscan ${{ vars.DOKKU_PRODUCTION_HOST }} >> ~/.ssh/known_hosts
          
          APP_NAME="boardgamejourney"
          
          # Configure production environment variables
          ssh dokku@${{ vars.DOKKU_PRODUCTION_HOST }} "config:set ${APP_NAME} NODE_ENV=production"
          ssh dokku@${{ vars.DOKKU_PRODUCTION_HOST }} "config:set ${APP_NAME} APP_ENV=production"

      - name: Notify production deployment
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr-info.outputs.number }};
            const reviewer = context.payload.review.user.login;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Production Deployment Successful!**
            
              **Environment:** Production
              **URL:** https://boardgamejourney.net
              **Approved by:** @${reviewer}
              **Commit:** ${{ steps.pr-info.outputs.head-sha.substring(0, 7) }}
              **Deployed by:** @${context.actor}
            
              The application is now live in production! 🚀`
            });

      - name: Create deployment status
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id || 0,
              state: 'success',
              environment_url: 'https://boardgamejourney.net',
              description: 'Production deployment successful after approval'
            });